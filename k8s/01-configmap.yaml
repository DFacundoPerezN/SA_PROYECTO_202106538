apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: deliver-eats
  labels:
    app.kubernetes.io/part-of: deliver-eats
data:
  AUTH_GRPC_ADDR: "auth-service:50051"
  USER_GRPC_ADDR: "user-service:50052"
  CATALOG_GRPC_ADDR: "catalog-service:50053"
  RESTAURANT_GRPC_ADDR: "restaurant-service:50054"
  ORDER_GRPC_ADDR: "order-service:50055"
  CONVERT_GRPC_ADDR: "convert-service:50057"
  PAYMENT_GRPC_ADDR: "payment-service:50058"

  USER_SERVICE_HOST: "user-service"
  USER_SERVICE_PORT: "50052"
  USER_SERVICE_ADDR: "user-service:50052"
  CATALOG_SERVICE_ADDR: "catalog-service:50053"
  NOTIFICATION_SERVICE_ADDR: "notification-service:50056"

  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  CACHE_TTL: "3600"
  EXCHANGE_API_URL: "https://v6.exchangerate-api.com/v6"
  DEFAULT_CURRENCY: "USD"
  CONVERT_SERVER_PORT: "50057"

  DB_PORT: "1433"
  DB_WINDOWS_AUTH: "false"
  AUTH_DB_NAME: "Delivereats_SA"
  USER_DB_NAME: "Delivereats_SA_Usuarios"
  CATALOG_DB_NAME: "Delivereats_SA_Productos"
  RESTAURANT_DB_NAME: "Delivereats_SA_Restaurantes"
  ORDER_DB_NAME: "Delivereats_SA_Ordenes"
  PAYMENT_DB_NAME: "Delivereats_SA_Pagos"

  GATEWAY_SERVER_PORT: "8080"
  ORDER_GRPC_PORT: "50055"

  HTTP_READ_TIMEOUT: "15s"
  HTTP_WRITE_TIMEOUT: "15s"
  HTTP_IDLE_TIMEOUT: "60s"
  DEFAULT_REQUEST_TIMEOUT_MS: "15000"

  FEATURE_PROMOTIONS: "true"
  FEATURE_CUPONS: "true"
