apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: deliver-eats
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: deliver-eats
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend
        app.kubernetes.io/part-of: deliver-eats
    spec:
      imagePullSecrets:
        - name: artifact-registry-pull-secret
      containers:
        - name: frontend
          image: us-central1-docker.pkg.dev/enduring-guard-457223-c4/deliver-eats-repo/frontend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: deliver-eats
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: deliver-eats
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: frontend
  ports:
    - name: http
      port: 80
      targetPort: http
