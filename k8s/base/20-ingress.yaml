apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: deliver-eats-ingress
  namespace: deliver-eats
  labels:
    app.kubernetes.io/part-of: deliver-eats
  annotations:
    kubernetes.io/ingress.class: gce
    kubernetes.io/ingress.allow-http: "true"
spec:
  ingressClassName: gce
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
