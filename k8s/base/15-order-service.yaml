apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: deliver-eats
  labels:
    app.kubernetes.io/name: order-service
    app.kubernetes.io/part-of: deliver-eats
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: order-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: order-service
        app.kubernetes.io/part-of: deliver-eats
    spec:
      imagePullSecrets:
        - name: artifact-registry-pull-secret
      containers:
        - name: order-service
          image: us-central1-docker.pkg.dev/enduring-guard-457223-c4/deliver-eats-repo/order-service:latest
          imagePullPolicy: Always
          ports:
            - name: grpc
              containerPort: 50055
          env:
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_PORT
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DB_PASSWORD
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: ORDER_DB_NAME
            - name: DB_WINDOWS_AUTH
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_WINDOWS_AUTH
            - name: GRPC_PORT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: ORDER_GRPC_PORT
            - name: CATALOG_SERVICE_ADDR
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: CATALOG_SERVICE_ADDR
            - name: USER_SERVICE_ADDR
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: USER_SERVICE_ADDR
            - name: NOTIFICATION_SERVICE_ADDR
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: NOTIFICATION_SERVICE_ADDR
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: RABBITMQ_URL
            - name: SMTP_HOST
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: SMTP_HOST
            - name: SMTP_PORT
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: SMTP_PORT
            - name: SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: SMTP_USER
            - name: SMTP_PASS
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: SMTP_PASS
            - name: SMTP_FROM
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: SMTP_FROM
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: deliver-eats
  labels:
    app.kubernetes.io/name: order-service
    app.kubernetes.io/part-of: deliver-eats
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: order-service
  ports:
    - name: grpc
      port: 50055
      targetPort: grpc
