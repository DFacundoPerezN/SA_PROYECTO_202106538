apiVersion: apps/v1
kind: Deployment
metadata:
  name: convert-service
  namespace: deliver-eats
  labels:
    app.kubernetes.io/name: convert-service
    app.kubernetes.io/part-of: deliver-eats
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: convert-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: convert-service
        app.kubernetes.io/part-of: deliver-eats
    spec:
      imagePullSecrets:
        - name: artifact-registry-pull-secret
      containers:
        - name: convert-service
          image: us-central1-docker.pkg.dev/enduring-guard-457223-c4/deliver-eats-repo/convert-service:latest
          imagePullPolicy: Always
          ports:
            - name: grpc
              containerPort: 50057
          env:
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: REDIS_PORT
            - name: REDIS_DB
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: REDIS_DB
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: REDIS_PASSWORD
            - name: CACHE_TTL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: CACHE_TTL
            - name: EXCHANGE_API_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: EXCHANGE_API_URL
            - name: EXCHANGE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: EXCHANGE_API_KEY
            - name: DEFAULT_CURRENCY
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DEFAULT_CURRENCY
            - name: SERVER_PORT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: CONVERT_SERVER_PORT
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: convert-service
  namespace: deliver-eats
  labels:
    app.kubernetes.io/name: convert-service
    app.kubernetes.io/part-of: deliver-eats
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: convert-service
  ports:
    - name: grpc
      port: 50057
      targetPort: grpc
