apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: deliver-eats
  labels:
    app.kubernetes.io/name: notification-service
    app.kubernetes.io/part-of: deliver-eats
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: notification-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: notification-service
        app.kubernetes.io/part-of: deliver-eats
    spec:
      imagePullSecrets:
        - name: artifact-registry-pull-secret
      containers:
        - name: notification-service
          image: us-central1-docker.pkg.dev/enduring-guard-457223-c4/deliver-eats-repo/notification-service:latest
          imagePullPolicy: Always
          ports:
            - name: grpc
              containerPort: 50056
          env:
            - name: SMTP_HOST
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: SMTP_HOST
            - name: SMTP_PORT
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: SMTP_PORT
            - name: SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: SMTP_USER
            - name: SMTP_PASS
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: SMTP_PASS
            - name: SMTP_FROM
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: SMTP_FROM
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: deliver-eats
  labels:
    app.kubernetes.io/name: notification-service
    app.kubernetes.io/part-of: deliver-eats
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: notification-service
  ports:
    - name: grpc
      port: 50056
      targetPort: grpc
