syntax = "proto3";

package payment;

option go_package = "delivery-proto/paymentpb";

service PaymentService {
  rpc ProcessPayment (ProcessPaymentRequest) returns (ProcessPaymentResponse);

  rpc RefundPayment (RefundPaymentRequest) returns (RefundPaymentResponse);

  rpc GetPayments (GetPaymentsRequest) returns (GetPaymentsResponse);
}

message ProcessPaymentRequest {
  int32 order_id = 1;
  string payment_method = 2; 
  bool use_cupon = 3; 
  int32 client_id = 4;
}

message ProcessPaymentResponse {
  int32 payment_id = 1;
  string status = 2;
  string message = 3;
}

message RefundPaymentRequest {
  int32 order_id = 1;
}

message RefundPaymentResponse {
  bool success = 1;
  string message = 2;
}

message GetPaymentsRequest {
  int32 client_id = 1; // opcional (para filtrar pagos de un cliente)
}

message Payment {
  int32 id = 1;
  int32 order_id = 2;
  int32 client_id = 3;
  double precio_final = 4;
  string estado = 5;
  bool usa_cupon = 6;
  string metodo_pago = 7;
  string moneda = 8;
}

message GetPaymentsResponse {
  repeated Payment payments = 1;
}