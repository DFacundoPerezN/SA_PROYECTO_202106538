syntax = "proto3";

package restaurantpb;

option go_package = "delivery-proto/restaurantpb";

service RestaurantService {
  rpc ListRestaurants (Empty) returns (RestaurantListResponse);
  rpc CreateRestaurant(CreateRestaurantRequest)    returns (CreateRestaurantResponse);

  rpc CreateRestaurantRating(CreateRestaurantRatingRequest) returns (CreateRestaurantRatingResponse);

  rpc GetRestaurantRatingAverage(GetRestaurantRatingAverageRequest) returns (GetRestaurantRatingAverageResponse);

  rpc GetLatestRestaurants(GetLatestRestaurantsRequest) returns (GetRestaurantsResponse);

  rpc GetTopRatedRestaurants(GetTopRatedRestaurantsRequest) returns (GetRestaurantsResponse);

  // Promociones
  rpc CreatePromocion(CreatePromocionRequest)   returns (CreatePromocionResponse);
  rpc GetPromociones(GetPromocionesRequest)     returns (GetPromocionesResponse);
  rpc UpdatePromocion(UpdatePromocionRequest)   returns (UpdatePromocionResponse);

  // Cupones
  rpc CreateCupon(CreateCuponRequest)       returns (CreateCuponResponse);
  rpc GetCupones(GetCuponesRequest)         returns (GetCuponesResponse);
  rpc UpdateCupon(UpdateCuponRequest)       returns (UpdateCuponResponse);
  rpc AutorizarCupon(AutorizarCuponRequest) returns (AutorizarCuponResponse);
}

message Empty {}

message Restaurant {
    int32 id = 1;
    string nombre = 2;
    string direccion = 3;
    double latitud = 4;
    double longitud = 5;
    string telefono = 6;
    double calificacion = 7;
    bool activo = 8;
}

message RestaurantListResponse {
    repeated Restaurant restaurants = 1;
}

message CreateRestaurantRequest {
  int32 user_id = 1;

  string nombre = 2;
  string direccion = 3;
  double latitud = 4;
  double longitud = 5;

  string telefono = 6;
  string horario_apertura = 7;
  string horario_cierre = 8;
}

message CreateRestaurantResponse {
  int32 restaurant_id = 1;
  string message = 2;
}

message CreateRestaurantRatingRequest {
  int32 cliente_id = 1;
  int32 restaurante_id = 2;
  int32 estrellas = 3;
  string comentario = 4;
}

message CreateRestaurantRatingResponse {
  int32 rating_id = 1;
  string message = 2;
}

message GetRestaurantRatingAverageRequest {
  int32 restaurante_id = 1;
}

message GetRestaurantRatingAverageResponse {
  double promedio = 1;
  int32 total_calificaciones = 2;
}

message GetLatestRestaurantsRequest {
  int32 limit = 1;
}

message GetTopRatedRestaurantsRequest {
  int32 limit = 1;
}

message GetRestaurantsResponse {
  repeated Restaurant restaurants = 1;
}
// ─── Promocion ───────────────────────────────────────────────────────────────

message Promocion {
  int32  id             = 1;
  int32  restaurante_id = 2;
  string titulo         = 3;
  string descripcion    = 4;
  string tipo           = 5;   // "PORCENTAJE" | "ENVIO_GRATIS"
  double valor          = 6;
  string fecha_inicio   = 7;   // ISO 8601
  string fecha_fin      = 8;   // ISO 8601
  bool   activa         = 9;
}

// CreatePromocion
message CreatePromocionRequest {
  int32  restaurante_id = 1;
  string titulo         = 2;
  string descripcion    = 3;
  string tipo           = 4;
  double valor          = 5;
  string fecha_inicio   = 6;
  string fecha_fin      = 7;
}

message CreatePromocionResponse {
  int32  id      = 1;
  string message = 2;
}

// GetPromociones (con filtros)
message GetPromocionesRequest {
  int32  restaurante_id = 1;   // 0 = todos los restaurantes
  bool   solo_activas   = 2;   // true = WHERE Activa = 1
  string tipo           = 3;   // "" = todos los tipos
  string fecha_desde    = 4;   // "" = sin límite inferior  (ISO 8601)
  string fecha_hasta    = 5;   // "" = sin límite superior  (ISO 8601)
}

message GetPromocionesResponse {
  repeated Promocion promociones = 1;
}

// UpdatePromocion
message UpdatePromocionRequest {
  int32  id           = 1;
  string titulo       = 2;
  string descripcion  = 3;
  string tipo         = 4;
  double valor        = 5;
  string fecha_inicio = 6;
  string fecha_fin    = 7;
  bool   activa       = 8;
}

message UpdatePromocionResponse {
  string message = 1;
}

// ─── Cupon ───────────────────────────────────────────────────────────────────

message Cupon {
  int32  id               = 1;
  int32  restaurante_id   = 2;
  string codigo           = 3;
  string titulo           = 4;
  string descripcion      = 5;
  double valor            = 6;
  int32  uso_maximo       = 7;
  int32  usos_actuales    = 8;
  string fecha_inicio     = 9;   // ISO 8601
  string fecha_expiracion = 10;  // ISO 8601
  bool   autorizado       = 11;
  bool   activo           = 12;
}

// CreateCupon — lo hace el restaurante
message CreateCuponRequest {
  int32  restaurante_id   = 1;
  string codigo           = 2;
  string titulo           = 3;
  string descripcion      = 4;
  double valor            = 5;
  int32  uso_maximo       = 6;
  string fecha_inicio     = 7;  // ISO 8601, opcional (default NOW)
  string fecha_expiracion = 8;  // ISO 8601, requerido
}

message CreateCuponResponse {
  int32  id      = 1;
  string message = 2;
}

// GetCupones — con filtros combinables
message GetCuponesRequest {
  int32  restaurante_id   = 1;  // 0 = todos
  bool   solo_activos     = 2;
  bool   solo_autorizados = 3;
  string codigo           = 4;  // "" = sin filtro (búsqueda exacta)
  string fecha_desde      = 5;  // "" = sin límite inferior (ISO 8601)
  string fecha_hasta      = 6;  // "" = sin límite superior (ISO 8601)
}

message GetCuponesResponse {
  repeated Cupon cupones = 1;
}

// UpdateCupon — lo hace el restaurante (no puede cambiar Autorizado)
message UpdateCuponRequest {
  int32  id               = 1;
  string titulo           = 2;
  string descripcion      = 3;
  double valor            = 4;
  int32  uso_maximo       = 5;
  string fecha_inicio     = 6;
  string fecha_expiracion = 7;
  bool   activo           = 8;
}

message UpdateCuponResponse {
  string message = 1;
}

// AutorizarCupon — exclusivo del administrador
message AutorizarCuponRequest {
  int32 id         = 1;
  bool  autorizado = 2;
}

message AutorizarCuponResponse {
  string message = 1;
}
