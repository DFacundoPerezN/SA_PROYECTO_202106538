syntax = "proto3";

package userpb;

option go_package = "delivery-proto/userpb";

service UserService {
  rpc GetUserByEmail (GetUserByEmailRequest) returns (UserResponse);
  rpc GetUserByID (GetUserByIDRequest) returns (UserResponse);
  rpc CreateUser (CreateUserRequest) returns (CreateUserResponse);
  rpc ListUsers (ListUsersRequest) returns (ListUsersResponse);

  rpc CreateDriverRating(CreateDriverRatingRequest) returns (CreateDriverRatingResponse);
  rpc GetDriverRatingAverage(GetDriverRatingAverageRequest) returns (GetDriverRatingAverageResponse);
  rpc CreateClientRating(CreateClientRatingRequest) returns (CreateClientRatingResponse);
  rpc GetClientRatingAverage(GetClientRatingAverageRequest) returns (GetClientRatingAverageResponse);
}

message User {
  int32 id = 1;
  string email = 2;
  string password = 3;
  string nombre_completo = 4;
  string role = 5;
}

message GetUserByEmailRequest {
  string email = 1;
}

message GetUserByIDRequest {
  int32 id = 1;
}

message UserResponse {
  User user = 1;
}

message CreateUserRequest {
  string email = 1;
  string password = 2;
  string nombre_completo = 3;
  string rol = 4;
}

message CreateUserResponse {
  int64 user_id = 1;
  string email = 2;
  string role = 3;
  string nombre_completo = 4;
  string telefono = 5;
}

message ListUsersRequest {
  int32 page = 1;
  int32 page_size = 2;
  string role_filter = 3;
}

message ListUsersResponse {
  repeated User users = 1;
  int32 total = 2;
  int32 page = 3;
  int32 page_size = 4;
}

message CreateDriverRatingRequest {
  int32 cliente_id = 1;
  int32 repartidor_id = 2;
  int32 estrellas = 3;
  string comentario = 4;
}

message CreateDriverRatingResponse {
  int32 rating_id = 1;
  string message = 2;
}

message GetDriverRatingAverageRequest {
  int32 repartidor_id = 1;
}

message GetDriverRatingAverageResponse {
  double promedio = 1;
  int32 total_calificaciones = 2;
}

message CreateClientRatingRequest {
  int32 cliente_id = 1;
  int32 repartidor_id = 2;
  int32 orden_id = 3;
  int32 estrellas = 4;
  string comentario = 5;
}

message CreateClientRatingResponse {
  int32 rating_id = 1;
  string message = 2;
}

message GetClientRatingAverageRequest {
  int32 cliente_id = 1;
}

message GetClientRatingAverageResponse {
  double promedio = 1;
  int32 total_calificaciones = 2;
}